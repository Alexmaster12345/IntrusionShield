version: "3.9"

services:
  intrusion-shield:
    build: .
    container_name: intrusion-shield
    network_mode: host       # required for raw packet capture
    cap_add:
      - NET_RAW
      - NET_ADMIN
    volumes:
      - ./config.json:/app/config.json:ro
      - ./rules:/app/rules:ro
      - ./logs:/app/logs
      - ./captures:/app/captures
    environment:
      - TZ=UTC
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: intrusion-shield-db
    environment:
      POSTGRES_USER: intrusion
      POSTGRES_PASSWORD: shield
      POSTGRES_DB: intrusion_shield
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intrusion -d intrusion_shield"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: intrusion-shield-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pgdata:
  grafana_data:
